const N=DATA.length;
const imgs=[];
let loaded=0;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const dotsEl=document.getElementById('dots');
for(let i=0;i<N;i++){
  const d=document.createElement('div');d.className='dot';d.id='d'+i;dotsEl.appendChild(d);
  const img=new Image();
  img.onload=()=>{loaded++;if(loaded===N)start();};
  img.src=DATA[i];
  imgs.push(img);
}
let frame=0,timer=null;
function draw(){
  ctx.clearRect(0,0,160,160);
  const img=imgs[frame];
  const scale=Math.min(160/img.naturalWidth,160/img.naturalHeight)*0.88;
  const dw=img.naturalWidth*scale,dh=img.naturalHeight*scale;
  ctx.drawImage(img,(160-dw)/2,(160-dh)/2,dw,dh);
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));
  document.getElementById('d'+frame).classList.add('active');
  frame=(frame+1)%N;
}
function start(){
  const speed=parseInt(document.getElementById('speed').value);
  clearInterval(timer);timer=setInterval(draw,speed);
  draw();
}
document.getElementById('speed').oninput=function(){
  document.getElementById('sv').textContent=this.value+'ms';
  start();
};
</script>
